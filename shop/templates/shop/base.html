<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Artisan Bottle | Premium Spirits{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f0f0f;
            --secondary-bg: #1a1a1a;
            --accent-color: #c5a059;
            --accent-hover: #e0bc74;
            --text-main: #f8f9fa;
            --text-muted: #a0a0a0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(197, 160, 89, 0.2);
        }

        body { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--primary-bg); 
            color: var(--text-main);
            line-height: 1.6;
        }

        header { 
            background: rgba(15, 15, 15, 0.95); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header a { 
            color: var(--text-main); 
            text-decoration: none; 
            transition: color 0.3s;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent-color) !important;
        }

        nav a {
            margin-left: 2rem;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            font-weight: 600;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        .container { 
            max-width: 1200px; 
            margin: 3rem auto; 
            padding: 0 1.5rem; 
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 1.5rem;
        }

        .sidebar { 
            width: 240px; 
            float: left;
            background: var(--secondary-bg);
            padding: 1.5rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .sidebar h3 { font-size: 1.2rem; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { margin-bottom: 0.8rem; }
        .sidebar a { color: var(--text-muted); text-decoration: none; transition: 0.3s; font-size: 0.95rem; }
        .sidebar a:hover { color: var(--accent-color); padding-left: 5px; }

        .content { margin-left: 280px; }

        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 2.5rem; 
        }

        .product-item { 
            background: var(--secondary-bg); 
            border: 1px solid var(--border-color);
            overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
        }

        .product-item:hover { 
            transform: translateY(-8px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .product-item img { 
            width: 100%; 
            height: 320px; 
            object-fit: cover; 
            filter: grayscale(20%);
            transition: 0.5s;
        }
        
        .product-item:hover img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        .product-info { 
            padding: 1.5rem; 
            text-align: center;
        }

        .product-info h3 { margin: 0 0 0.5rem 0; font-size: 1.3rem; }
        .product-info h3 a { color: var(--text-main); text-decoration: none; }

        .product-price { 
            font-size: 1.2rem; 
            color: var(--accent-color); 
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .btn { 
            display: inline-block; 
            padding: 0.8rem 1.5rem; 
            background: transparent; 
            color: var(--accent-color); 
            text-decoration: none; 
            border: 1px solid var(--accent-color);
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer; 
            transition: all 0.3s;
        }

        .btn:hover { 
            background: var(--accent-color); 
            color: var(--primary-bg);
        }

        .btn-success {
            background: var(--accent-color);
            color: var(--primary-bg);
        }
        
        .btn-success:hover {
            background: var(--accent-hover);
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: var(--secondary-bg); 
            border: 1px solid var(--border-color);
        }
        
        th { 
            padding: 1.2rem; 
            text-align: left; 
            color: var(--accent-color);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border-color);
        }

        td { 
            padding: 1.2rem; 
            border-bottom: 1px solid var(--border-color); 
            color: var(--text-main);
        }

        .cart-summary { 
            text-align: right; 
            margin-top: 2rem; 
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; 
            color: var(--accent-color);
        }

        .checkout-form input, .checkout-form select, .checkout-form textarea { 
            display: block; 
            width: 100%; 
            padding: 1rem; 
            margin-bottom: 1.5rem; 
            background: var(--secondary-bg);
            border: 1px solid var(--border-color); 
            color: var(--text-main);
            border-radius: 0;
            box-sizing: border-box; 
        }

        .checkout-form input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .api-link { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            margin-top: 5rem; 
            border-top: 1px solid var(--border-color); 
            padding-top: 2rem; 
            text-align: center;
        }
        
        .api-link a { color: var(--accent-color); text-decoration: none; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; float: none; margin-bottom: 2rem; }
            .content { margin-left: 0; }
            header { flex-direction: column; gap: 1rem; }
            nav a { margin: 0 0.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="{% url 'shop:product_list' %}" class="logo">ARTISAN BOTTLE</a>
        <nav>
            <a href="{% url 'shop:product_list' %}">Collections</a>
            <a href="{% url 'shop:cart_detail' %}">Your Cart</a>
        </nav>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
        
        <div class="api-link">
            &copy; 2026 Artisan Bottle. All Rights Reserved.<br>
            AI-Ready API: <a href="{% url 'shop:api-root' %}">/api/</a>
        </div>
    </div>
</body>
</html>
